<!DOCTYPE html>
<html>
    <head>
        <title>Task A</title>
        <style>
            #myNav {
                background-color:rgb(180, 180, 180);
                padding: 10px;
            }
            #myNav a {
                text-decoration: none;
                color: rgb(255, 255, 190);
            }
        </style>
        <script>
            function functionName() {
                element = document.getElementById("imageId1");
                if (element.src.match("https://upload.wikimedia.org/wikipedia/en/thumb/8/80/Wikipedia-logo-v2.svg/330px-Wikipedia-logo-v2.svg.png")) {
                    element.src = "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/WikiHow_logo_2014.svg/500px-WikiHow_logo_2014.svg.png";
                } else {
                    element.src = "https://upload.wikimedia.org/wikipedia/en/thumb/8/80/Wikipedia-logo-v2.svg/330px-Wikipedia-logo-v2.svg.png";
                }
            }
            function event1() {
                document.getElementById("myNav").style.backgroundColor="rgb(90, 90, 90)"
            }
            function event2() {
                document.getElementById("myNav").style.backgroundColor="rgb(180, 180, 180)"
            }
            function zoomIn() {
                document.getElementById("imageId2").style.transform="scale(1.2)"
            }
            function zoomOut() {
                document.getElementById("imageId2").style.transform="scale(1)"
            }
            function updateText() {
                document.getElementById("textDisplay").innerText = document.getElementById("textSelect").value;
            }
        </script>
    </head>
    <body>
        <img id="imageId1" onclick="functionName()" src="https://upload.wikimedia.org/wikipedia/en/thumb/8/80/Wikipedia-logo-v2.svg/330px-Wikipedia-logo-v2.svg.png" width="100" height="100">
        <nav id="myNav" onmouseover="event1()" onmouseout="event2()">
            <a href="https://upload.wikimedia.org/wikipedia/en/thumb/8/80/Wikipedia-logo-v2.svg/330px-Wikipedia-logo-v2.svg.png" target="_blank">Wikipedia Logo</a>
            <a href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/WikiHow_logo_2014.svg/500px-WikiHow_logo_2014.svg.png" target="_blank">WikiHow Logo</a>
        </nav>
        <img id="imageId2" onmouseover="zoomIn()" onmouseout="zoomOut()" src="https://upload.wikimedia.org/wikipedia/en/thumb/8/80/Wikipedia-logo-v2.svg/330px-Wikipedia-logo-v2.svg.png" width="100" height="100">Wikipedia Logo</img>
        <select id="textSelect" onchange="updateText()" style="font-size:20px;">
            <option value="Good morning">Good morning</option>
            <option value="Good afternoon">Good afternoon</option>
            <option value="Good evening">Good evening</option>
        </select>
        <div id="textDisplay" style="margin-top:20px;font-size:25px;">Good morning</div>
    </body>
</html>
